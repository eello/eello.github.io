<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eello blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <header>
        <div class="header-inner">
            <div class="header-left">
                <button id="sidebar-toggle" aria-label="Toggle Sidebar">☰</button>
                <h1><a href="./index.html">eello blog</a></h1>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                <span class="toggle-track">
                    <span class="toggle-icon sun">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    </span>
                    <span class="toggle-icon moon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </span>
                    <span class="toggle-thumb"></span>
                </span>
            </button>
        </div>
    </header>
    <div class="container main-layout">
        <aside class="sidebar" id="sidebar">
            <button id="sidebar-close" aria-label="Close Sidebar">×</button>
            <div class="sidebar-inner">
                <h3>Categories</h3>
                <ul class="category-list">
                    
        <li><a href="./index.html" class="category-all-link">All Posts <span class="count">(2)</span></a></li>
        <li><a href="?category=%EC%95%84%ED%82%A4%ED%85%8D%EC%B2%98">아키텍처 <span class="count">(1)</span></a></li>
<li><a href="?category=%EC%95%8C%EA%B3%A0%EB%A6%AC%EC%A6%98">알고리즘 <span class="count">(1)</span></a></li>
    
                </ul>
            </div>
        </aside>
        <main class="content">
            <ul class="post-list" id="post-list">
                
            <li data-category="아키텍처">
                <div class="post-meta">
                    <span class="post-category">아키텍처</span>
                    <span class="post-date-divider">·</span>
                    <span class="post-date">2026-02-13</span>
                </div>
                <h2 class="post-title"><a href="채팅 시스템 설계 - 단일 서버/">단일 서버 채팅 시스템 설계</a></h2>
                <p class="post-excerpt">카카오톡처럼 1:1 혹은 소규모 인원이 채팅하는 시스템을 단일 서버 기준으로 설계</p>
            </li>
        

            <li data-category="알고리즘">
                <div class="post-meta">
                    <span class="post-category">알고리즘</span>
                    <span class="post-date-divider">·</span>
                    <span class="post-date">2026-02-12</span>
                </div>
                <h2 class="post-title"><a href="BOJ 큐빙 - Kotlin/">큐빙 풀이 - Kotlin</a></h2>
                <p class="post-excerpt">BOJ 플레티넘 5 - 큐빙 Kotlin 풀이</p>
            </li>
        
            </ul>
        </main>
    </div>
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebarClose = document.getElementById('sidebar-close');
        const sidebar = document.getElementById('sidebar');
        const body = document.body;
        const postList = document.getElementById('post-list');

        // 1. Check localStorage
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            body.className = savedTheme;
        } else {
            // 2. Check system preference
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                body.className = 'dark-mode';
            } else {
                body.className = 'light-mode';
            }
        }

        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('light-mode')) {
                body.classList.replace('light-mode', 'dark-mode');
                localStorage.setItem('theme', 'dark-mode');
            } else {
                body.classList.replace('dark-mode', 'light-mode');
                localStorage.setItem('theme', 'light-mode');
            }
        });

        // Sidebar logic
        function toggleSidebar() {
            sidebar.classList.toggle('active');
        }

        sidebarToggle.addEventListener('click', toggleSidebar);
        
        if (sidebarClose) {
            sidebarClose.addEventListener('click', () => {
                sidebar.classList.remove('active');
            });
        }

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768) {
                if (!sidebar.contains(e.target) && !sidebarToggle.contains(e.target) && sidebar.classList.contains('active')) {
                    sidebar.classList.remove('active');
                }
            }
        });

        // Category Filtering
        function filterPosts() {
            const params = new URLSearchParams(window.location.search);
            const category = params.get('category');
            const posts = Array.from(postList.getElementsByTagName('li'));
            
            // Update active state in category list
            const catLinks = document.querySelectorAll('.category-list a');
            catLinks.forEach(link => {
                // Check if it's the "All Posts" link
                if (link.classList.contains('category-all-link')) {
                    if (!category) {
                        link.classList.add('active');
                    } else {
                        link.classList.remove('active');
                    }
                } else {
                    const linkCat = new URL(link.href, window.location.origin).searchParams.get('category');
                    if (linkCat === category) {
                        link.classList.add('active');
                    } else {
                        link.classList.remove('active');
                    }
                }
            });

            let visiblePosts = [];

            if (category) {
                for (let post of posts) {
                    const postCat = post.getAttribute('data-category');
                    if (postCat === category) {
                        post.style.display = '';
                        visiblePosts.push(post);
                    } else {
                        post.style.display = 'none';
                    }
                }
            } else {
                for (let post of posts) {
                    post.style.display = '';
                    visiblePosts.push(post);
                }
            }

            // Fix dynamic border for the last visible item
            posts.forEach(post => post.classList.remove('last-visible'));
            if (visiblePosts.length > 0) {
                visiblePosts[visiblePosts.length - 1].classList.add('last-visible');
            }
        }

        // Initial filter on load
        filterPosts();
    </script>
</body>
</html>
